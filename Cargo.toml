[workspace]
members = [
    "crates/mesh-llm",
    "crates/mesh-llm-plugin",
    "crates/mesh-client",
    "crates/mesh-api",
    "crates/mesh-host-core",
    "crates/mesh-api-ffi",
    "crates/mesh-llm-test-harness",
    "crates/model-ref",
    "crates/model-artifact",
    "crates/model-hf",
    "crates/skippy-protocol",
    "crates/skippy-topology",
    "crates/skippy-metrics",
    "crates/openai-frontend",
    "crates/skippy-ffi",
    "crates/skippy-runtime",
    "crates/skippy-server",
    "crates/metrics-server",
    "crates/llama-model-slice",
    "crates/skippy-correctness",
    "crates/llama-spec-bench",
    "tools/xtask",
]
default-members = [
    "crates/mesh-llm",
    "crates/mesh-llm-plugin",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
