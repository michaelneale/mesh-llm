name: Queue Unsloth layer packages

on:
  schedule:
    - cron: "23 17 * * *"
  workflow_dispatch:
    inputs:
      max_jobs:
        description: "Maximum HF Jobs to submit"
        required: false
        default: "3"
      dry_run:
        description: "Compare candidates without submitting HF Jobs"
        required: false
        type: boolean
        default: false
      mesh_llm_ref:
        description: "mesh-llm git ref for the split job to build"
        required: false
        default: "main"
      quant_preference:
        description: "Comma-separated 4-bit quant preference"
        required: false
        default: "UD-Q4_K_XL,UD-Q4_K_M,Q4_K_XL,Q4_K_M"

permissions:
  contents: read

concurrency:
  group: queue-unsloth-layer-packages
  cancel-in-progress: false

jobs:
  queue:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      MAX_JOBS: ${{ github.event.inputs.max_jobs || '3' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      MESH_LLM_REF: ${{ github.event.inputs.mesh_llm_ref || 'main' }}
      QUANT_PREFERENCE: ${{ github.event.inputs.quant_preference || 'UD-Q4_K_XL,UD-Q4_K_M,Q4_K_XL,Q4_K_M' }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: mesh-llm-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Queue split jobs
        run: |
          set -euo pipefail

          args=(
            --max-jobs "$MAX_JOBS"
            --mesh-llm-ref "$MESH_LLM_REF"
            --quant-preference "$QUANT_PREFERENCE"
          )

          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          elif [[ -z "${HF_TOKEN:-}" ]]; then
            echo "HF_TOKEN secret is required to queue HF Jobs." >&2
            exit 1
          fi

          cargo run -p model-prepare --bin queue-unsloth-layer-packages -- "${args[@]}"
