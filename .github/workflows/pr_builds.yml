name: PR Builds

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHE_NAMESPACE: mesh-llm
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/9e6855bc4be717fca1ef21360a1db4b29d5c559a/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"
  LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-static

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ui: ${{ steps.filter.outputs.ui }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
      sdk: ${{ steps.filter.outputs.sdk }}
      docker: ${{ steps.filter.outputs.docker }}
      windows_cpu: ${{ steps.filter.outputs.windows_cpu }}
      windows_gpu: ${{ steps.filter.outputs.windows_gpu }}
      docs: ${{ steps.filter.outputs.docs }}
      affected_crates: ${{ steps.compute.outputs.affected_crates }}
      test_crates: ${{ steps.compute.outputs.test_crates }}
      batches_json: ${{ steps.compute.outputs.batches_json }}
      all_rust: ${{ steps.compute.outputs.all_rust }}
      docs_only: ${{ steps.compute.outputs.docs_only }}
      rust_changed: ${{ steps.compute.outputs.rust_changed }}
      backend_changed: ${{ steps.compute.outputs.backend_changed }}
      sdk_smoke_required: ${{ steps.compute.outputs.sdk_smoke_required }}
      ui_dist_cache_key: ${{ steps.ui_key.outputs.ui_dist_cache_key }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'tools/xtask/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - 'scripts/**'
              - 'third_party/llama.cpp/**'
              - '.github/cache-version.txt'
              - '.github/workflows/pr_builds.yml'
              - '.github/workflows/pr_quality.yml'
              - '.github/workflows/smoke.yml'

            ui:
              - 'crates/mesh-llm-ui/**'
            benchmarks:
              - 'crates/skippy-bench/**'
              - 'crates/llama-spec-bench/**'
              - 'crates/mesh-llm-gpu-bench/**'
              - '.github/workflows/pr_builds.yml'
            sdk:
              - 'crates/mesh-api/**'
              - 'crates/mesh-api-ffi/**'
              - 'crates/mesh-client/**'
              - 'crates/mesh-llm-identity/**'
              - 'crates/mesh-llm-protocol/**'
              - 'crates/mesh-llm-routing/**'
              - 'crates/mesh-llm-types/**'
              - 'sdk/**'
              - 'Package.swift'
              - 'scripts/ci-native-sdk-smoke.sh'
              - 'scripts/ci-kotlin-sdk-smoke.sh'
              - 'scripts/ci-swift-sdk-smoke.sh'
              - 'scripts/ci-sdk-fixture.sh'
              - '.github/workflows/pr_builds.yml'
            docker:
              - '.dockerignore'
              - 'docker/**'
              - 'fly/Dockerfile'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/pr_docker.yml'
            windows_cpu:
              - 'crates/skippy-ffi/**'
              - 'scripts/build-windows.ps1'
              - 'third_party/llama.cpp/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - '.github/cache-version.txt'
              - '.github/workflows/pr_builds.yml'
              - '.github/workflows/windows-warm-caches.yml'
            windows_gpu:
              - 'crates/skippy-ffi/**'
              - 'scripts/build-windows.ps1'
              - 'scripts/install-windows-sdk.ps1'
              - 'third_party/llama.cpp/**'
              - 'Justfile'
              - '.github/cache-version.txt'
              - '.github/actions/setup-windows-rocm-sdk/**'
              - '.github/workflows/pr_builds.yml'
              - '.github/workflows/windows-warm-caches.yml'

            docs:
              - 'docs/**'
              - '**.md'
              - '!crates/**'
              - '!third_party/**'
      - id: compute
        uses: ./.github/actions/compute-changes
        with:
          event_name: ${{ github.event_name }}
          base_sha: ${{ github.event.pull_request.base.sha || '' }}
          head_sha: ${{ github.event.pull_request.head.sha || '' }}
      - name: Compute UI dist cache key
        id: ui_key
        run: |
          HASH=$(git ls-files -s crates/mesh-llm-ui .github/cache-version.txt | git hash-object --stdin)
          echo "ui_dist_cache_key=${CACHE_NAMESPACE}-ui-dist-${HASH}" >> "$GITHUB_OUTPUT"

  linux_targets:
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.backend_changed == 'true' || needs.changes.outputs.benchmarks == 'true') && needs.changes.outputs.docs_only != 'true' }}
    name: Linux ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CPU
            backend: cpu
            container: ubuntu:22.04
            cache_key: linux-cpu
            build_dir: .deps/llama.cpp/build-stage-abi-static
          - name: CUDA slim
            backend: cuda
            container: nvidia/cuda:${{ vars.CUDA_VERSION || '12.6.3' }}-devel-ubuntu22.04
            cache_key: linux-cuda-slim
            build_dir: .deps/llama-build/build-stage-abi-cuda-sm89
            cuda_arch: "89"
          - name: ROCm slim
            backend: rocm
            container: rocm/dev-ubuntu-24.04:7.2.3
            cache_key: linux-rocm-slim
            build_dir: .deps/llama-build/build-stage-abi-rocm-gfx1100
            amdgpu_targets: gfx1100
          - name: Vulkan
            backend: vulkan
            container: ubuntu:24.04
            cache_key: linux-vulkan
            build_dir: .deps/llama-build/build-stage-abi-vulkan
    env:
      RUN_LINUX_CPU: ${{ matrix.backend == 'cpu' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true') }}
      RUN_LINUX_BACKEND: ${{ matrix.backend != 'cpu' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_changed == 'true' || needs.changes.outputs.benchmarks == 'true') }}
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
      LLAMA_STAGE_BUILD_DIR: ${{ matrix.build_dir }}
      LLAMA_STAGE_CUDA_ARCHITECTURES: ${{ matrix.cuda_arch }}
      LLAMA_STAGE_AMDGPU_TARGETS: ${{ matrix.amdgpu_targets }}
      MESH_LLM_SKIP_UI: "1"
      GGML_CUDA_NO_VMM: "1"
      LLAMA_STAGE_SKIP_NCCL: "1"
    steps:
      - name: Skip Linux CPU producer
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU != 'true' }}
        run: echo "Skipping Linux CPU producer because this change only touches backend-specific inputs."
      - name: Skip Linux backend target
        if: ${{ matrix.backend != 'cpu' && env.RUN_LINUX_BACKEND != 'true' }}
        run: echo "Skipping Linux ${{ matrix.name }} because this change does not touch backend build inputs."
      - uses: actions/checkout@v5
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}

      - uses: pnpm/action-setup@v4
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') }}
        with:
          version: latest

      - uses: actions/setup-node@v5
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') }}
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml

      - name: Install Linux CPU action prerequisites
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates lsb-release python3 python3-pip python3-venv python-is-python3

      - name: Build UI
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') }}
        working-directory: crates/mesh-llm-ui
        run: pnpm i --frozen-lockfile && pnpm run build

      - name: Test UI
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') }}
        working-directory: crates/mesh-llm-ui
        run: pnpm test

      - name: Save UI dist cache
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (github.ref == 'refs/heads/main' && needs.changes.outputs.ui == 'true') }}
        uses: actions/cache/save@v4
        with:
          path: crates/mesh-llm-ui/dist
          key: ${{ needs.changes.outputs.ui_dist_cache_key }}

      - name: Install Python SDKs
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: python3 -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      - name: Install Hugging Face CLI
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: python3 -m pip install --upgrade "huggingface_hub[cli]"

      - name: Install system dependencies
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl git jq lsof lld

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        with:
          targets: aarch64-linux-android

      - name: Configure Linux Rust linker
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.x86_64-unknown-linux-gnu]
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF

      - uses: mozilla-actions/sccache-action@v0.0.9
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: linux
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check release-target repo consistency
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: cargo run -p xtask -- repo-consistency release-targets

      - name: Check embedded client dependency purity
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: |
          cargo tree -p mesh-llm-client --prefix=none --no-dedupe > /tmp/mesh-client-deps.txt
          FORBIDDEN="keyring|rpassword|hf-hub|dirs|clap|include_dir|rmcp|keyring-core"
          if grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt; then
            echo "ERROR: Forbidden dependency found in mesh-client"
            grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt
            exit 1
          fi

      - name: SDK and API crate tests
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm-client') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-api') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-api-ffi')) }}
        env:
          AFFECTED: ${{ needs.changes.outputs.affected_crates }}
          ALL_RUST: ${{ needs.changes.outputs.all_rust }}
        run: |
          should_test() {
            local crate="$1"
            [ "$ALL_RUST" = "true" ] || jq -e --arg crate "$crate" 'index($crate) != null' <<<"$AFFECTED" >/dev/null
          }

          for c in mesh-llm-client mesh-api mesh-api-ffi; do
            if should_test "$c"; then
              cargo test -p "$c"
            else
              echo "Skipping $c; not affected"
            fi
          done

      - name: Ensure ABI cache directory
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: mkdir -p "$LLAMA_STAGE_BUILD_DIR"

      - name: Cache patched llama.cpp ABI build
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        id: llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-static
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-abi-cpu-${{ hashFiles('scripts/build-llama.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}

      - name: Prepare patched llama.cpp ABI checkout
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (steps.llama_cache.outputs.cache-hit != 'true') }}
        run: scripts/prepare-llama.sh pinned

      - name: Build patched llama.cpp ABI libraries
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (steps.llama_cache.outputs.cache-hit != 'true') }}
        run: scripts/build-llama.sh

      - name: Skippy crate tests
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-protocol') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-server') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'openai-frontend') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-runtime') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-topology') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-model-package') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-prompt') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'metrics-server')) }}
        env:
          AFFECTED: ${{ needs.changes.outputs.affected_crates }}
          ALL_RUST: ${{ needs.changes.outputs.all_rust }}
        run: |
          should_test() {
            local crate="$1"
            [ "$ALL_RUST" = "true" ] || jq -e --arg crate "$crate" 'index($crate) != null' <<<"$AFFECTED" >/dev/null
          }

          flags_for() {
            case "$1" in
              skippy-protocol|skippy-server|openai-frontend) printf '%s' '--lib' ;;
              *) printf '%s' '' ;;
            esac
          }

          for c in skippy-protocol skippy-server openai-frontend skippy-runtime skippy-topology skippy-model-package skippy-prompt metrics-server; do
            if should_test "$c"; then
              extra_flag="$(flags_for "$c")"
              if [ -n "$extra_flag" ]; then
                cargo test -p "$c" "$extra_flag"
              else
                cargo test -p "$c"
              fi
            else
              echo "Skipping $c; not affected"
            fi
          done

      # Keep the debug binary build and smoke always-on: smoke coverage still
      # exercises the built mesh-llm binary even when the unit-test set shrinks.
      - name: Build mesh-llm binary (debug)
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: cargo build -p mesh-llm --bin mesh-llm

      - name: Unit tests
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'model-artifact') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm-host-runtime') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm')) }}
        env:
          AFFECTED: ${{ needs.changes.outputs.affected_crates }}
          ALL_RUST: ${{ needs.changes.outputs.all_rust }}
        run: |
          should_test() {
            local crate="$1"
            [ "$ALL_RUST" = "true" ] || jq -e --arg crate "$crate" 'index($crate) != null' <<<"$AFFECTED" >/dev/null
          }

          for c in model-artifact mesh-llm-host-runtime mesh-llm; do
            if should_test "$c"; then
              cargo test -p "$c" --lib
            else
              echo "Skipping $c; not affected"
            fi
          done

      - name: Skippy smoke tests
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        timeout-minutes: 45
        env:
          WORK_DIR: ${{ runner.temp }}/skippy-ci-smoke
        run: scripts/skippy-ci-smoke.sh

      - name: Protocol compatibility matrix
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm-protocol')) }}
        run: |
          cargo test -p mesh-llm --test protocol_compat_v0_client
          cargo test -p mesh-llm --test protocol_convert_matrix

      - name: CLI smoke test
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: |
          target/debug/mesh-llm --log-format json --version
          target/debug/mesh-llm --log-format json --help | head -5

      - name: Client-auto boot test
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        run: scripts/ci-client-auto-test.sh target/debug/mesh-llm

      - name: Upload Linux inference binary
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: ci-linux-inference-binaries
          path: target/debug/mesh-llm
          if-no-files-found: error
          retention-days: 1

      - name: Show sccache stats
        if: ${{ matrix.backend == 'cpu' && env.RUN_LINUX_CPU == 'true' && (always()) }}
        run: sccache --show-stats || true

      - name: Install base packages
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        run: |
          packages="ca-certificates curl git cmake ninja-build pkg-config libssl-dev libdbus-1-dev python3 build-essential lld"
          if [ "${{ matrix.backend }}" = "vulkan" ]; then
            packages="$packages software-properties-common glslc libvulkan-dev spirv-headers"
          elif [ "${{ matrix.backend }}" = "rocm" ]; then
            packages="$packages hipblas-dev rocblas-dev"
          fi
          for attempt in 1 2 3; do
            if [ "${{ matrix.backend }}" = "vulkan" ]; then
              apt-get -o Acquire::Retries=5 update &&
                DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing software-properties-common &&
                add-apt-repository -y universe
            fi
            apt-get -o Acquire::Retries=5 update &&
              DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing $packages &&
              break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          if [ "${{ matrix.backend }}" = "vulkan" ]; then
            command -v glslc
            pkg-config --exists vulkan
          fi
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v5
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
      - name: Configure Linux Rust linker
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.x86_64-unknown-linux-gnu]
          rustflags = ["-C", "link-arg=-fuse-ld=lld"]
          EOF
      - uses: taiki-e/install-action@just
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
      - uses: mozilla-actions/sccache-action@v0.0.9
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: ${{ matrix.cache_key }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Prepare UI placeholder
        if: ${{ env.RUN_LINUX_BACKEND == 'true' }}
        run: mkdir -p crates/mesh-llm-ui/dist && printf '<html></html>' > crates/mesh-llm-ui/dist/index.html
      - name: Ensure Vulkan ABI cache directory
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' }}
        run: mkdir -p "$LLAMA_STAGE_BUILD_DIR"
      - name: Cache Vulkan ABI build
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' }}
        id: backend_llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama-build/build-stage-abi-vulkan
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-skippy-abi-vulkan-${{ hashFiles('scripts/build-linux.sh', 'scripts/build-llama.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}
      - name: Build Linux CUDA backend
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'cuda' }}
        run: just --shell bash --shell-arg -lc release-build-cuda 89
      - name: Build Linux ROCm backend
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'rocm' }}
        run: |
          export CMAKE_PREFIX_PATH="/opt/rocm:${CMAKE_PREFIX_PATH:-}"
          just --shell bash --shell-arg -lc release-build-rocm gfx1100
      - name: Build Linux Vulkan backend
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' && steps.backend_llama_cache.outputs.cache-hit != 'true' }}
        run: just --shell bash --shell-arg -lc release-build-vulkan
      - name: Build Linux Vulkan binary only
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' && steps.backend_llama_cache.outputs.cache-hit == 'true' }}
        run: cargo build --release -p mesh-llm
      - name: Linux CUDA CLI smoke test
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'cuda' }}
        run: |
          cuda_stub_runtime="$(mktemp -d)"
          ln -s /usr/local/cuda/lib64/stubs/libcuda.so "$cuda_stub_runtime/libcuda.so.1"
          export LD_LIBRARY_PATH="$cuda_stub_runtime:/usr/local/cuda/lib64/stubs:${LD_LIBRARY_PATH:-}"
          target/release/mesh-llm --log-format json --version
      - name: Linux ROCm CLI smoke test
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'rocm' }}
        run: |
          export LD_LIBRARY_PATH="/opt/rocm/lib:${LD_LIBRARY_PATH:-}"
          target/release/mesh-llm --log-format json --version
      - name: Linux Vulkan CLI smoke test
        if: ${{ env.RUN_LINUX_BACKEND == 'true' && matrix.backend == 'vulkan' }}
        run: target/release/mesh-llm --log-format json --version

  hf_download_smoke:
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'model-artifact')) && needs.changes.outputs.docs_only != 'true' }}
    name: HuggingFace download smoke
    uses: ./.github/workflows/hf-download-smoke.yml
    with:
      timeout_minutes: 15

  inference_smoke_tests:
    needs: [changes, linux_targets]
    if: ${{ needs.linux_targets.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-server') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'skippy-runtime') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'openai-frontend') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'model-artifact')) && needs.changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/smoke.yml
    with:
      artifact_name: ci-linux-inference-binaries
      mesh_binary_target: target/debug/mesh-llm
      cache_key_prefix: ''

  agent_live_smokes:
    needs: [changes, linux_targets]
    if: ${{ (vars.MESH_AGENT_BASE_URL != '' || vars.MESH_OPENCODE_BASE_URL != '') && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'openai-frontend') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm-client')) && needs.changes.outputs.docs_only != 'true' }}
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      MESH_AGENT_BASE_URL: ${{ vars.MESH_AGENT_BASE_URL || vars.MESH_OPENCODE_BASE_URL }}
      MESH_AGENT_MODEL: ${{ vars.MESH_AGENT_MODEL || vars.MESH_OPENCODE_MODEL }}
      MESH_OPENCODE_BASE_URL: ${{ vars.MESH_AGENT_BASE_URL || vars.MESH_OPENCODE_BASE_URL }}
      MESH_OPENCODE_MODEL: ${{ vars.MESH_AGENT_MODEL || vars.MESH_OPENCODE_MODEL }}
      AGENT_SMOKE_LONG_PROMPT_CHARS: ${{ vars.AGENT_SMOKE_LONG_PROMPT_CHARS || vars.OPENCODE_SMOKE_LONG_PROMPT_CHARS || '65536' }}
      OPENCODE_SMOKE_LONG_PROMPT_CHARS: ${{ vars.OPENCODE_SMOKE_LONG_PROMPT_CHARS || '65536' }}
      OPENCODE_DISABLE_AUTOUPDATE: "true"
      OPENCODE_DISABLE_PRUNE: "true"
      OPENCODE_DISABLE_LSP_DOWNLOAD: "true"
    steps:
      # Keep the self-hosted live-agent smoke on Node 20 actions so CI does not
      # depend on the runner being upgraded in lockstep with GitHub-hosted images.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install agent CLIs
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          export PNPM_HOME="$HOME/.local/share/pnpm"
          mkdir -p "$PNPM_HOME"
          echo "PNPM_HOME=$PNPM_HOME" >> "$GITHUB_ENV"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"
          pnpm add --global opencode-ai@latest @earendil-works/pi-coding-agent@latest
          opencode --version
          pi --version
      - name: Install Goose
        run: |
          curl -fsSL https://github.com/aaif-goose/goose/releases/download/stable/download_cli.sh | CONFIGURE=false bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Check Goose
        run: goose --version
      - name: OpenCode configured mesh coding smoke
        run: scripts/ci-opencode-smoke.sh
      - name: Pi configured mesh coding smoke
        run: scripts/ci-pi-smoke.sh
      - name: Goose configured mesh coding smoke
        run: scripts/ci-goose-smoke.sh

  two_node_client_serving_smoke:
    needs: [changes, linux_targets]
    if: ${{ needs.linux_targets.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'openai-frontend') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm-client')) && needs.changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/scripted-binary-smoke.yml
    with:
      artifact_name: ci-linux-inference-binaries
      artifact_path: ci-artifacts/linux
      staged_binary_path: target/debug/mesh-llm
      model_cache_scope: two-node-smoke-model
      smoke_script: scripts/ci-two-node-client-serving-smoke.sh
      timeout_minutes: 20

  native_sdk_smoke:
    needs: [changes, linux_targets]
    if: ${{ needs.linux_targets.result == 'success' && needs.changes.outputs.sdk_smoke_required == 'true' && needs.changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/sdk-smoke.yml
    with:
      sdk_kind: native
      artifact_name: ci-linux-inference-binaries
      artifact_path: ci-artifacts/linux
      staged_binary_path: target/debug/mesh-llm
      model_cache_scope: sdk-smoke-model
      runs_on: '"ubuntu-latest"'

  kotlin_sdk_smoke:
    needs: [changes, linux_targets]
    if: ${{ needs.linux_targets.result == 'success' && needs.changes.outputs.sdk_smoke_required == 'true' && needs.changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/sdk-smoke.yml
    with:
      sdk_kind: kotlin
      artifact_name: ci-linux-inference-binaries
      artifact_path: ci-artifacts/linux
      staged_binary_path: target/debug/mesh-llm
      model_cache_scope: sdk-smoke-model
      runs_on: '"ubuntu-latest"'

  swift_sdk_smoke:
    needs: [changes, macos_targets]
    if: ${{ needs.macos_targets.result == 'success' && needs.changes.outputs.sdk_smoke_required == 'true' && needs.changes.outputs.docs_only != 'true' }}
    uses: ./.github/workflows/sdk-smoke.yml
    with:
      sdk_kind: swift
      artifact_name: ci-macos-inference-binaries
      artifact_path: ci-artifacts/macos
      staged_binary_path: target/debug/mesh-llm
      model_cache_scope: sdk-smoke-model
      runs_on: '"macos-14"'
      timeout_minutes: 40

  macos_targets:
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.benchmarks == 'true' || needs.changes.outputs.backend_changed == 'true') && needs.changes.outputs.docs_only != 'true' }}
    name: macOS ${{ matrix.name }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CPU
            backend: cpu
          - name: CUDA
            backend: cuda
          - name: ROCm
            backend: rocm
          - name: Vulkan
            backend: vulkan
    env:
      RUN_MACOS_CPU: ${{ matrix.backend == 'cpu' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.benchmarks == 'true') }}
      LLAMA_STAGE_BACKEND: metal
      LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-metal
    steps:
      - name: Skip macOS CPU producer
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU != 'true' }}
        run: echo "Skipping macOS CPU producer because this change only touches unsupported macOS backend markers."
      - name: Skip unsupported macOS GPU backend
        if: ${{ matrix.backend != 'cpu' }}
        run: echo "Skipping macOS ${{ matrix.name }} because CUDA, ROCm, and Vulkan PR builds are unsupported on macOS runners."
      - uses: actions/checkout@v5
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
      - uses: pnpm/action-setup@v4
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') }}
        with:
          version: latest
      - uses: actions/setup-node@v5
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') }}
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - name: Restore UI dist cache
        id: ui-cache
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (needs.changes.outputs.ui == 'true' || github.event_name == 'workflow_dispatch') }}
        uses: actions/cache/restore@v4
        with:
          path: crates/mesh-llm-ui/dist
          key: ${{ needs.changes.outputs.ui_dist_cache_key }}
      - name: Build UI
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && ((github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') && steps.ui-cache.outputs.cache-hit != 'true') }}
        working-directory: crates/mesh-llm-ui
        run: pnpm i --frozen-lockfile && pnpm run build
      - name: Install UI deps (cache hit only)
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (needs.changes.outputs.ui == 'true' && steps.ui-cache.outputs.cache-hit == 'true') }}
        working-directory: crates/mesh-llm-ui
        run: pnpm i --frozen-lockfile
      - name: Verify UI dist exists
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (needs.changes.outputs.ui == 'true' || github.event_name == 'workflow_dispatch') }}
        run: |
          if [ ! -f crates/mesh-llm-ui/dist/index.html ]; then
            echo "ERROR: crates/mesh-llm-ui/dist/index.html not found after restore/build"
            exit 1
          fi
          echo "UI dist OK: $(ls crates/mesh-llm-ui/dist | wc -l) files"
      - name: Test UI
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ui == 'true') }}
        working-directory: crates/mesh-llm-ui
        run: pnpm test
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: macos
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install build dependencies
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        run: brew install cmake ninja jq lld
      - name: Configure macOS Rust linker
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        run: |
          mkdir -p .cargo
          lld_prefix="$(brew --prefix lld)"
          cat > .cargo/config.toml <<EOF
          [target.aarch64-apple-darwin]
          rustflags = ["-C", "link-arg=-fuse-ld=$lld_prefix/bin/ld64.lld"]

          [target.x86_64-apple-darwin]
          rustflags = ["-C", "link-arg=-fuse-ld=$lld_prefix/bin/ld64.lld"]
          EOF
      - name: Ensure ABI cache directory
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        run: mkdir -p "$LLAMA_STAGE_BUILD_DIR"
      - name: Cache patched llama.cpp ABI build
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        id: llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-metal
          key: ${{ env.CACHE_NAMESPACE }}-macos-14-skippy-abi-metal-${{ hashFiles('scripts/build-mac.sh', 'scripts/build-llama.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}
      - name: Prepare patched llama.cpp ABI checkout
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (steps.llama_cache.outputs.cache-hit != 'true') }}
        run: scripts/prepare-llama.sh pinned
      - name: Build patched llama.cpp ABI libraries
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (steps.llama_cache.outputs.cache-hit != 'true') }}
        run: scripts/build-llama.sh
      - name: Build mesh-llm binary (debug)
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        run: cargo build -p mesh-llm --bin mesh-llm
      - name: Unit tests
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' && (needs.changes.outputs.all_rust == 'true' || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'model-artifact') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm-host-runtime') || contains(fromJson(needs.changes.outputs.affected_crates || '[]'), 'mesh-llm')) }}
        env:
          AFFECTED: ${{ needs.changes.outputs.affected_crates }}
          ALL_RUST: ${{ needs.changes.outputs.all_rust }}
        run: |
          should_test() {
            local crate="$1"
            [ "$ALL_RUST" = "true" ] || jq -e --arg crate "$crate" 'index($crate) != null' <<<"$AFFECTED" >/dev/null
          }

          for c in model-artifact mesh-llm-host-runtime mesh-llm; do
            if should_test "$c"; then
              cargo test -p "$c" --lib
            else
              echo "Skipping $c on macOS (not affected)"
            fi
          done
      - name: CLI smoke test
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        run: |
          target/debug/mesh-llm --log-format json --version
          target/debug/mesh-llm --log-format json --help | head -5
      - name: Upload macOS inference binary
        if: ${{ matrix.backend == 'cpu' && env.RUN_MACOS_CPU == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: ci-macos-inference-binaries
          path: target/debug/mesh-llm
          if-no-files-found: error
          retention-days: 1

  windows_targets:
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.all_rust == 'true' || needs.changes.outputs.windows_cpu == 'true' || needs.changes.outputs.windows_gpu == 'true') && needs.changes.outputs.docs_only != 'true' }}
    name: Windows ${{ matrix.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CPU
            backend: cpu
            cache_key: windows-cpu
          - name: CUDA
            backend: cuda
            build_recipe: release-build-cuda-windows
            build_args: "75"
          - name: ROCm
            backend: rocm
            build_recipe: release-build-rocm-windows
            build_args: "gfx1100"
          - name: Vulkan
            backend: vulkan
            build_recipe: release-build-vulkan-windows
            build_args: ""
    env:
      RUN_WINDOWS_CPU_FULL: ${{ matrix.backend == 'cpu' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.windows_cpu == 'true') }}
      RUN_WINDOWS_GPU: ${{ matrix.backend != 'cpu' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.windows_gpu == 'true') }}
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
      LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-${{ matrix.backend }}
      MESH_LLM_SKIP_UI: "1"
      MESH_LLM_REQUIRE_SCCACHE: "1"
      RUSTC_WRAPPER: sccache
      WINDOWS_CUDA_VERSION: ${{ vars.CUDA_VERSION || '12.6.3' }}
      WINDOWS_VULKAN_SDK_VERSION: ${{ vars.VULKAN_SDK_VERSION || '1.4.328.1' }}
      ROCM_HIP_SDK_FILENAME: AMD-Software-PRO-Edition-25.Q3-WinSvr2022-For-HIP.exe
    steps:
      - name: Skip Windows CPU full build
        if: ${{ matrix.backend == 'cpu' && env.RUN_WINDOWS_CPU_FULL != 'true' }}
        shell: pwsh
        run: Write-Host "Running Windows CPU cargo check because this change does not touch Windows CPU build inputs."
      - name: Skip Windows GPU build
        if: ${{ matrix.backend != 'cpu' && env.RUN_WINDOWS_GPU != 'true' }}
        shell: pwsh
        run: Write-Host "Skipping Windows ${{ matrix.name }} because this change does not touch Windows GPU build inputs."
      - uses: actions/checkout@v5
        if: ${{ matrix.backend == 'cpu' || env.RUN_WINDOWS_GPU == 'true' }}
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.backend == 'cpu' || env.RUN_WINDOWS_GPU == 'true' }}
      - uses: taiki-e/install-action@just
        if: ${{ env.RUN_WINDOWS_CPU_FULL == 'true' || env.RUN_WINDOWS_GPU == 'true' }}
      - uses: mozilla-actions/sccache-action@v0.0.9
        if: ${{ matrix.backend == 'cpu' || env.RUN_WINDOWS_GPU == 'true' }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ matrix.backend == 'cpu' || env.RUN_WINDOWS_GPU == 'true' }}
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: windows-${{ matrix.backend }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Prepare UI placeholder
        if: ${{ env.RUN_WINDOWS_CPU_FULL == 'true' || env.RUN_WINDOWS_GPU == 'true' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path crates/mesh-llm-ui/dist | Out-Null
          '<html></html>' | Set-Content -Path crates/mesh-llm-ui/dist/index.html -Encoding utf8
      - name: Ensure ABI cache directory
        if: ${{ env.RUN_WINDOWS_CPU_FULL == 'true' || env.RUN_WINDOWS_GPU == 'true' }}
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:LLAMA_STAGE_BUILD_DIR | Out-Null
      - name: Cache patched llama.cpp ABI build
        if: ${{ env.RUN_WINDOWS_CPU_FULL == 'true' || env.RUN_WINDOWS_GPU == 'true' }}
        id: llama_cache
        uses: actions/cache@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-${{ matrix.backend }}
          key: ${{ env.CACHE_NAMESPACE }}-windows-2022-skippy-abi-${{ matrix.backend }}-${{ matrix.build_args }}-${{ matrix.backend == 'cuda' && format('cuda-{0}-Jimver-v0.2.35', env.WINDOWS_CUDA_VERSION) || matrix.backend == 'vulkan' && format('vulkan-{0}-jakoch-v1.5.2', env.WINDOWS_VULKAN_SDK_VERSION) || matrix.backend == 'rocm' && format('rocm-{0}', env.ROCM_HIP_SDK_FILENAME) || 'cpu' }}-${{ hashFiles('scripts/build-windows.ps1', 'scripts/install-windows-sdk.ps1', '.github/actions/setup-windows-rocm-sdk/action.yml', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}
      - name: Install CUDA toolkit
        if: ${{ env.RUN_WINDOWS_GPU == 'true' && matrix.backend == 'cuda' && steps.llama_cache.outputs.cache-hit != 'true' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.WINDOWS_CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'
          use-github-cache: true
          use-local-cache: true
          log-file-suffix: windows-cuda
      - name: Verify CUDA toolkit
        if: ${{ env.RUN_WINDOWS_GPU == 'true' && matrix.backend == 'cuda' && steps.llama_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          if (-not $env:CUDA_PATH -or -not (Test-Path $env:CUDA_PATH)) {
            throw "CUDA_PATH was not configured by Jimver/cuda-toolkit."
          }
          & nvcc --version
          foreach ($library in @("cuda.lib", "cudart.lib", "cublas.lib", "cublasLt.lib")) {
            $path = Join-Path $env:CUDA_PATH "lib\x64\$library"
            if (-not (Test-Path $path)) {
              throw "Expected CUDA import library was not found: $path"
            }
          }
      - name: Install Vulkan SDK
        if: ${{ env.RUN_WINDOWS_GPU == 'true' && matrix.backend == 'vulkan' && steps.llama_cache.outputs.cache-hit != 'true' }}
        uses: jakoch/install-vulkan-sdk-action@v1.5.2
        with:
          vulkan_version: ${{ env.WINDOWS_VULKAN_SDK_VERSION }}
          cache: true
          stripdown: true
      - name: Verify Vulkan SDK
        if: ${{ env.RUN_WINDOWS_GPU == 'true' && matrix.backend == 'vulkan' && steps.llama_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          if (-not $env:VULKAN_SDK -or -not (Test-Path $env:VULKAN_SDK)) {
            throw "VULKAN_SDK was not configured by jakoch/install-vulkan-sdk-action."
          }
          $glslc = Join-Path $env:VULKAN_SDK "Bin\glslc.exe"
          if (-not (Test-Path $glslc)) {
            throw "glslc.exe was not found at $glslc"
          }
          & $glslc --version
          $vulkanLib = Join-Path $env:VULKAN_SDK "Lib\vulkan-1.lib"
          if (-not (Test-Path $vulkanLib)) {
            throw "Expected Vulkan import library was not found: $vulkanLib"
          }
      - name: Install ROCm HIP SDK
        if: ${{ env.RUN_WINDOWS_GPU == 'true' && matrix.backend == 'rocm' && steps.llama_cache.outputs.cache-hit != 'true' }}
        uses: ./.github/actions/setup-windows-rocm-sdk
        with:
          rocm-hip-sdk-filename: ${{ env.ROCM_HIP_SDK_FILENAME }}
      - name: Build Windows CPU backend
        if: ${{ env.RUN_WINDOWS_CPU_FULL == 'true' && steps.llama_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: just release-build-windows
      - name: Build Windows CPU binary only
        if: ${{ env.RUN_WINDOWS_CPU_FULL == 'true' && steps.llama_cache.outputs.cache-hit == 'true' }}
        shell: pwsh
        run: cargo build --release --locked -p mesh-llm
      - name: Check mesh-llm binary on Windows
        if: ${{ matrix.backend == 'cpu' && env.RUN_WINDOWS_CPU_FULL != 'true' }}
        shell: pwsh
        run: cargo check --locked -p mesh-llm --bin mesh-llm
      - name: Build Windows GPU backend
        if: ${{ env.RUN_WINDOWS_GPU == 'true' && steps.llama_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        env:
          MESH_LLM_REQUIRE_SCCACHE: "1"
        run: |
          if ("${{ matrix.build_args }}" -ne "") {
            just ${{ matrix.build_recipe }} "${{ matrix.build_args }}"
          } else {
            just ${{ matrix.build_recipe }}
          }
      - name: Verify cached Windows GPU ABI build
        if: ${{ env.RUN_WINDOWS_GPU == 'true' && steps.llama_cache.outputs.cache-hit == 'true' }}
        shell: pwsh
        run: |
          $libs = Get-ChildItem -Path $env:LLAMA_STAGE_BUILD_DIR -Recurse -File -Filter *.lib -ErrorAction SilentlyContinue | Select-Object -First 20
          if (-not $libs) {
            throw "No static libraries were found under $env:LLAMA_STAGE_BUILD_DIR."
          }
          $libs | ForEach-Object { Write-Host $_.FullName }
      - name: CLI smoke test
        if: ${{ env.RUN_WINDOWS_CPU_FULL == 'true' || env.RUN_WINDOWS_GPU == 'true' }}
        shell: pwsh
        run: |
          if ("${{ matrix.backend }}" -eq "cpu") {
            .\target\release\mesh-llm.exe --log-format json --version
            .\target\release\mesh-llm.exe --log-format json --help | Select-Object -First 5
          } elseif ("${{ steps.llama_cache.outputs.cache-hit }}" -eq "true") {
            Write-Host "Skipping Windows ${{ matrix.name }} launch smoke because the cached ABI was verified without relinking."
          } elseif (-not (Test-Path .\target\release\mesh-llm.exe)) {
            throw "target\release\mesh-llm.exe was not produced"
          } else {
            Write-Host "Skipping Windows ${{ matrix.name }} launch smoke on the hosted runner because GPU drivers are not available."
          }
