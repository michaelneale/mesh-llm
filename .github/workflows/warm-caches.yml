  warm_llama_rocm_fat:
    name: Warm Linux ROCm fat cache
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Resolve llama.cpp upstream SHA
        id: llama_sha
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(git ls-remote https://github.com/michaelneale/llama.cpp.git refs/heads/upstream-latest | cut -f1)
          if [[ -z "$SHA" ]]; then
            echo "Failed to resolve llama.cpp upstream-latest SHA" >&2
            exit 1
          fi
          echo "Resolved llama.cpp upstream-latest SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Restore llama.cpp ROCm fat build
        id: llama_rocm_fat_cache
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ env.CACHE_NAMESPACE }}-llama-rocm-fat-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('scripts/build-linux-amd.sh', 'Justfile', '.github/workflows/ci.yml', '.github/workflows/warm-caches.yml', '.github/cache-version.txt') }}-gfx90a-gfx942-gfx1100-gfx1101-gfx1102-gfx1200-gfx1201-rocm7.0

      - name: Short-circuit if ROCm fat cache already warm
        if: steps.llama_rocm_fat_cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "✓ llama.cpp ROCm fat cache already warm for SHA ${{ steps.llama_sha.outputs.sha }}"
          ls -lh llama.cpp/build/bin/ | head -20

      - name: Build Linux ROCm fat backend (full build)
        if: steps.llama_rocm_fat_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          MESH_LLM_LLAMA_PIN_SHA: ${{ steps.llama_sha.outputs.sha }}
        run: |
          just --shell bash --shell-arg -lc release-build-amd

      - name: Verify ROCm fat binaries are present
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d llama.cpp/build/bin ]]; then
            echo "ERROR: llama.cpp/build/bin is missing after build" >&2
            exit 1
          fi
          ls -lh llama.cpp/build/bin/

      - name: Save llama.cpp ROCm fat build
        if: steps.llama_rocm_fat_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_rocm_fat_cache.outputs.cache-primary-key }}

      - name: Verify llama.cpp ROCm fat cache write
        if: steps.llama_rocm_fat_cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_rocm_fat_cache.outputs.cache-primary-key }}
          lookup-only: true
          fail-on-cache-miss: true

  prune_llama_gpu_caches:
    name: Prune old GPU caches
    needs:
      - warm_llama_cuda_slim
      - warm_llama_cuda_fat
      - warm_llama_rocm_slim
      - warm_llama_rocm_fat
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Prune old GPU caches
        uses: actions/github-script@v8
        env:
          CACHE_NAMESPACE: ${{ env.CACHE_NAMESPACE }}
          RETENTION: ${{ env.LLAMA_GPU_CACHE_RETENTION }}
          TARGET_REF: ${{ github.ref }}
        with:
          script: |
            const retention = parseInt(process.env.RETENTION, 10);
            const ref = process.env.TARGET_REF;
            const prefixes = [
              `${process.env.CACHE_NAMESPACE}-llama-cuda-slim-`,
              `${process.env.CACHE_NAMESPACE}-llama-cuda-fat-`,
              `${process.env.CACHE_NAMESPACE}-llama-rocm-slim-`,
              `${process.env.CACHE_NAMESPACE}-llama-rocm-fat-`,
            ];

            if (!Number.isFinite(retention) || retention < 1) {
              core.setFailed(
                `LLAMA_GPU_CACHE_RETENTION must be a positive integer, got: "${process.env.RETENTION}"`
              );
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const allCaches = [];
            for (let page = 1; page <= 10; page++) {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/actions/caches',
                {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                  page,
                  sort: 'created_at',
                  direction: 'desc',
                }
              );
              const pageCaches = data.actions_caches || [];
              allCaches.push(...pageCaches);
              if (pageCaches.length < 100) break;
            }

            const failures = [];
            const rows = [[
              { data: 'Prefix', header: true },
              { data: 'Before', header: true },
              { data: 'Deleted', header: true },
              { data: 'Failed', header: true },
              { data: 'Freed', header: true },
            ]];

            for (const prefix of prefixes) {
              const matching = allCaches.filter((c) => c.key.startsWith(prefix));
              core.notice(`Found ${matching.length} ${prefix}* cache(s) on ${ref}, retention = ${retention}`);

              const toDelete = matching.slice(retention);
              let deleted = 0;
              let freedBytes = 0;

              for (const cache of toDelete) {
                const sizeMiB = ((cache.size_in_bytes || 0) / (1024 * 1024)).toFixed(1);
                core.info(`Deleting cache ${cache.id} — ${cache.key} (${sizeMiB} MiB, created ${cache.created_at})`);
                try {
                  await github.request(
                    'DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}',
                    { owner, repo, cache_id: cache.id }
                  );
                  deleted += 1;
                  freedBytes += cache.size_in_bytes || 0;
                } catch (err) {
                  failures.push({ id: cache.id, key: cache.key, error: err.message });
                  core.warning(`Failed to delete cache ${cache.id}: ${err.message}`);
                }
              }

              rows.push([
                prefix,
                String(matching.length),
                String(deleted),
                String(toDelete.length - deleted),
                `${(freedBytes / (1024 * 1024)).toFixed(1)} MiB`,
              ]);
            }

            await core.summary
              .addHeading('GPU cache prune summary', 2)
              .addTable(rows)
              .write();

            if (failures.length > 0) {
              core.setFailed(`Failed to delete ${failures.length} cache(s); see warnings above`);
            }
