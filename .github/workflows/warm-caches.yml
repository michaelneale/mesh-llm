        uses: actions/cache/save@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_cuda_fat_cache.outputs.cache-primary-key }}

      - name: Verify llama.cpp CUDA fat cache write
        if: steps.llama_cuda_fat_cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_cuda_fat_cache.outputs.cache-primary-key }}
          lookup-only: true
          fail-on-cache-miss: true

  warm_llama_rocm_slim:
    name: Warm Linux ROCm slim cache
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Resolve llama.cpp upstream SHA
        id: llama_sha
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(git ls-remote https://github.com/michaelneale/llama.cpp.git refs/heads/upstream-latest | cut -f1)
          if [[ -z "$SHA" ]]; then
            echo "Failed to resolve llama.cpp upstream-latest SHA" >&2
            exit 1
          fi
          echo "Resolved llama.cpp upstream-latest SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Restore llama.cpp ROCm slim build
        id: llama_rocm_slim_cache
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ env.CACHE_NAMESPACE }}-llama-rocm-slim-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('scripts/build-linux-amd.sh', 'Justfile', '.github/workflows/ci.yml', '.github/workflows/warm-caches.yml', '.github/cache-version.txt') }}-gfx1100-rocm7.0

      - name: Short-circuit if ROCm slim cache already warm
        if: steps.llama_rocm_slim_cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "✓ llama.cpp ROCm slim cache already warm for SHA ${{ steps.llama_sha.outputs.sha }}"
          ls -lh llama.cpp/build/bin/ | head -20

      - name: Build Linux ROCm slim backend (full build)
        if: steps.llama_rocm_slim_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          MESH_LLM_LLAMA_PIN_SHA: ${{ steps.llama_sha.outputs.sha }}
        run: |
          just --shell bash --shell-arg -lc release-build-amd gfx1100

