        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d llama.cpp/build/bin ]]; then
            echo "ERROR: llama.cpp/build/bin is missing after build" >&2
            exit 1
          fi
          ls -lh llama.cpp/build/bin/

      - name: Save llama.cpp ROCm slim build
        if: steps.llama_rocm_slim_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_rocm_slim_cache.outputs.cache-primary-key }}

      - name: Verify llama.cpp ROCm slim cache write
        if: steps.llama_rocm_slim_cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_rocm_slim_cache.outputs.cache-primary-key }}
