          path: llama.cpp/build/bin
          key: ${{ env.CACHE_NAMESPACE }}-llama-cuda-fat-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('scripts/build-linux.sh', 'Justfile', '.github/workflows/ci.yml', '.github/workflows/warm-caches.yml', '.github/cache-version.txt') }}-arch75-80-86-89-90-120-fa-on-cuda12.8

      - name: Short-circuit if CUDA fat cache already warm
        if: steps.llama_cuda_fat_cache.outputs.cache-hit == 'true'
