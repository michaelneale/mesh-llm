name: Warm GPU CI caches

# ─────────────────────────────────────────────────────────────────────────────
# Populates the cross-PR Linux GPU artifact caches on main and prunes old
# versions so the repo-level GitHub Actions cache stays under the free-tier
# storage budget.
#
# Why this workflow is separate from ci.yml:
#
#   - ci.yml PR jobs only RESTORE the slim caches via actions/cache/restore@v5.
#     PR runs never write cache entries and never pollute PR-scoped storage.
#   - warm-caches.yml runs on push to main (filtered to cache-key inputs) and
#     on manual workflow_dispatch. It is the single writer for the main-scoped
#     GPU caches consumed by PR CI.
#   - The slim jobs warm the exact artifacts consumed by the current PR smoke
#     lanes (`linux_cuda` arch89/fa-off and `linux_rocm` gfx1100).
#   - The fat jobs warm the full default arch matrices for CUDA and ROCm so the
#     heavier artifact shapes have stable main-scoped cache entries too.
#
# Retention policy precedence:
#   1. workflow_dispatch input `retention` (one-off manual override)
#   2. repository variable `vars.LLAMA_GPU_CACHE_RETENTION` (persistent, set via
#      Settings → Secrets and variables → Actions → Variables)
#   3. hardcoded default of 2
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      # Every file listed here is also part of one or more cache keys. A change
      # to any of them invalidates the cache AND triggers this workflow to
      # rebuild and re-warm in the same commit.
      - 'scripts/build-linux.sh'
      - 'scripts/build-linux-amd.sh'
      - 'Justfile'
      - '.github/workflows/ci.yml'
      - '.github/workflows/warm-caches.yml'
      - '.github/cache-version.txt'
  workflow_dispatch:
    inputs:
      retention:
        description: 'Number of warmed GPU cache versions to keep (overrides vars.LLAMA_GPU_CACHE_RETENTION; default 2)'
        required: false
        default: ''

concurrency:
  group: warm-caches-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  CACHE_NAMESPACE: mesh-llm
  LLAMA_GPU_CACHE_RETENTION: ${{ github.event.inputs.retention || vars.LLAMA_GPU_CACHE_RETENTION || '2' }}

jobs:
  warm_llama_cuda_slim:
    name: Warm Linux CUDA slim cache
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Resolve llama.cpp upstream SHA
        id: llama_sha
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(git ls-remote https://github.com/michaelneale/llama.cpp.git refs/heads/upstream-latest | cut -f1)
          if [[ -z "$SHA" ]]; then
            echo "Failed to resolve llama.cpp upstream-latest SHA" >&2
            exit 1
          fi
          echo "Resolved llama.cpp upstream-latest SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Restore llama.cpp CUDA slim build
        id: llama_cuda_slim_cache
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ env.CACHE_NAMESPACE }}-llama-cuda-slim-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('scripts/build-linux.sh', 'Justfile', '.github/workflows/ci.yml', '.github/workflows/warm-caches.yml', '.github/cache-version.txt') }}-arch89-fa-off-cuda12.8

      - name: Short-circuit if CUDA slim cache already warm
        if: steps.llama_cuda_slim_cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "✓ llama.cpp CUDA slim cache already warm for SHA ${{ steps.llama_sha.outputs.sha }}"
          ls -lh llama.cpp/build/bin/ | head -20

      - name: Build Linux CUDA slim backend (full build)
        if: steps.llama_cuda_slim_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          MESH_LLM_CUDA_FA_ALL_QUANTS: off
          MESH_LLM_LLAMA_PIN_SHA: ${{ steps.llama_sha.outputs.sha }}
        run: |
          just --shell bash --shell-arg -lc release-build-cuda 89

      - name: Verify CUDA slim binaries are present
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d llama.cpp/build/bin ]]; then
            echo "ERROR: llama.cpp/build/bin is missing after build" >&2
            exit 1
          fi
          ls -lh llama.cpp/build/bin/

      - name: Save llama.cpp CUDA slim build
        if: steps.llama_cuda_slim_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_cuda_slim_cache.outputs.cache-primary-key }}

      - name: Verify llama.cpp CUDA slim cache write
        if: steps.llama_cuda_slim_cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: llama.cpp/build/bin
          key: ${{ steps.llama_cuda_slim_cache.outputs.cache-primary-key }}
          lookup-only: true
          fail-on-cache-miss: true

  warm_llama_cuda_fat:
    name: Warm Linux CUDA fat cache
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
