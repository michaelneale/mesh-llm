name: Reusable Smoke Tests

on:
  workflow_call:
    inputs:
      artifact_name:
        required: true
        type: string
      mesh_binary_target:
        required: true
        type: string
      cache_key_prefix:
        required: true
        type: string
      runs_on:
        required: false
        default: '"ubuntu-latest"'
        type: string

env:
  CACHE_NAMESPACE: mesh-llm
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/9e6855bc4be717fca1ef21360a1db4b29d5c559a/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf

jobs:
  smoke_tests:
    name: Skippy Inference Smoke Tests
    runs-on: ${{ fromJson(inputs.runs_on) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq lsof
          python -m pip install --upgrade pip -r ci/requirements-ci-python.txt
          npm install --global openai

      - uses: ./.github/actions/restore-smoke-inputs
        with:
          artifact_name: ${{ inputs.artifact_name }}
          artifact_path: ci-artifacts/linux
          staged_binary_path: ${{ inputs.mesh_binary_target }}
          model_url: ${{ env.MODEL_URL }}
          model_file: ${{ env.MODEL_FILE }}
          model_cache_scope: inference-smoke-model
          cache_key_prefix: ${{ inputs.cache_key_prefix }}
          save_model_cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Smoke test real skippy inference
        run: |
          scripts/ci-smoke-test.sh \
            "${{ inputs.mesh_binary_target }}" \
            ci-artifacts/linux \
            "$HOME/.models/$MODEL_FILE"

      - name: OpenAI client compatibility smoke
        run: |
          scripts/ci-compat-smoke.sh \
            "${{ inputs.mesh_binary_target }}" \
            ci-artifacts/linux \
            "$HOME/.models/$MODEL_FILE"

      - name: Constrained-stack smoke (detect oversized spawned futures)
        # Canary that detects pathologically oversized spawned futures by
        # running the smoke under a reduced tokio worker stack. The default
        # at runtime is 8 MiB (see crates/mesh-llm/src/main.rs); the canary
        # currently allows 2 MiB, which gives normal owner-control,
        # mesh, and inference startup state machines headroom while still
        # catching multi-megabyte regressions in spawn sites.
        env:
          MESH_TOKIO_STACK_SIZE: "2097152"
          MESH_CI_API_PORT: "9347"
          MESH_CI_CONSOLE_PORT: "3141"
          MESH_CI_LOG: /tmp/mesh-llm-ci-constrained-stack.log
        run: |
          scripts/ci-smoke-test.sh \
            "${{ inputs.mesh_binary_target }}" \
            ci-artifacts/linux \
            "$HOME/.models/$MODEL_FILE"
