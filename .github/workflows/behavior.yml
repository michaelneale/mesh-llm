name: Behavior Regression

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CACHE_NAMESPACE: mesh-llm
  SCCACHE_GHA_ENABLED: "true"

jobs:
  linux_build:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-behavior-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      - name: Clone llama.cpp fork
        run: git clone -b upstream-latest --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server

      - name: Package Linux binaries
        run: |
          mkdir -p ci-artifacts/linux-binaries
          cp target/release/mesh-llm ci-artifacts/linux-binaries/
          cp llama.cpp/build/bin/rpc-server ci-artifacts/linux-binaries/
          cp llama.cpp/build/bin/llama-server ci-artifacts/linux-binaries/
          cp llama.cpp/build/bin/llama-moe-split ci-artifacts/linux-binaries/ 2>/dev/null || true
          tar -czf ci-artifacts/linux-binaries.tgz -C ci-artifacts linux-binaries

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: behavior-linux-binaries
          path: ci-artifacts/linux-binaries.tgz
          if-no-files-found: error

  gguf_behavior:
    name: GGUF Behavior
    needs: linux_build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen2.5-0.5b
            url: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf
            file: qwen2.5-0.5b-instruct-q4_k_m.gguf
          - name: qwen3-0.6b
            url: https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q8_0.gguf
            file: Qwen3-0.6B-Q8_0.gguf
          - name: qwen3-josie-0.6b
            url: https://huggingface.co/mradermacher/JOSIE-IT1-Qwen3-0.6B-GGUF/resolve/main/JOSIE-IT1-Qwen3-0.6B.Q4_K_M.gguf
            file: JOSIE-IT1-Qwen3-0.6B.Q4_K_M.gguf
          - name: llama-3.2-1b
            url: https://huggingface.co/llmware/llama-3.2-1b-gguf/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf
            file: Llama-3.2-1B-Instruct-Q4_K_M.gguf
          - name: gemma-3-1b
            url: https://huggingface.co/ggml-org/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-Q4_K_M.gguf
            file: gemma-3-1b-it-Q4_K_M.gguf
          - name: gemma-2-2b
            url: https://huggingface.co/bartowski/gemma-2-2b-it-GGUF/resolve/main/gemma-2-2b-it-Q4_K_M.gguf
            file: gemma-2-2b-it-Q4_K_M.gguf
          - name: glm-4-9b
            url: https://huggingface.co/lmstudio-community/GLM-4-9B-0414-GGUF/resolve/main/GLM-4-9B-0414-Q4_K_M.gguf
            file: GLM-4-9B-0414-Q4_K_M.gguf
          - name: gemma-4-e4b
            url: https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q4_K_M.gguf
            file: gemma-4-E4B-it-Q4_K_M.gguf
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: behavior-linux-binaries
          path: ci-artifacts

      - name: Extract Linux binaries
        run: tar -xzf ci-artifacts/linux-binaries.tgz

      - name: Cache GGUF model
        id: cache-gguf-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ matrix.file }}
          key: behavior-gguf-model-${{ matrix.name }}

      - name: Download GGUF model
        if: steps.cache-gguf-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "${{ matrix.url }}" -o ~/.models/${{ matrix.file }}
          ls -lh ~/.models/${{ matrix.file }}

      - name: Run full MT-Bench behavior suite
        run: |
          python3 scripts/ci-mt-bench-behavior.py \
            --backend gguf \
            --mesh-llm linux-binaries/mesh-llm \
            --bin-dir linux-binaries \
            --model ~/.models/${{ matrix.file }} \
            --label "${{ matrix.name }}" \
            --output-json results/${{ matrix.name }}.json

      - name: Upload behavior report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gguf-behavior-${{ matrix.name }}
          path: results/${{ matrix.name }}.json
          if-no-files-found: error

  macos_build:
    name: macOS Build
    if: ${{ vars.ENABLE_MACOS_CI == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-behavior-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      - name: Clone llama.cpp fork
        run: git clone -b upstream-latest --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(sysctl -n hw.ncpu) --target rpc-server llama-server

      - name: Package macOS binaries
        run: |
          mkdir -p ci-artifacts/macos-binaries
          cp target/release/mesh-llm ci-artifacts/macos-binaries/
          cp llama.cpp/build/bin/rpc-server ci-artifacts/macos-binaries/
          cp llama.cpp/build/bin/llama-server ci-artifacts/macos-binaries/
          cp llama.cpp/build/bin/llama-moe-split ci-artifacts/macos-binaries/ 2>/dev/null || true
          cp llama.cpp/build/bin/*.dylib ci-artifacts/macos-binaries/ 2>/dev/null || true
          tar -czf ci-artifacts/macos-binaries.tgz -C ci-artifacts macos-binaries

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: behavior-macos-binaries
          path: ci-artifacts/macos-binaries.tgz
          if-no-files-found: error

  mlx_behavior:
    name: MLX Behavior
    if: ${{ vars.ENABLE_MACOS_CI == 'true' }}
    needs: macos_build
    runs-on: macos-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen2.5-0.5b
            repo: mlx-community/Qwen2.5-0.5B-Instruct-4bit
            cache_slug: mlx-community--Qwen2.5-0.5B-Instruct-4bit
          - name: qwen3-0.6b
            repo: mlx-community/Qwen3-0.6B-4bit
            cache_slug: mlx-community--Qwen3-0.6B-4bit
          - name: qwen3-josie-0.6b
            repo: mlx-community/JOSIE-IT1-Qwen3-0.6B-4bit
            cache_slug: mlx-community--JOSIE-IT1-Qwen3-0.6B-4bit
          - name: llama-3.2-1b
            repo: mlx-community/Llama-3.2-1B-Instruct-4bit
            cache_slug: mlx-community--Llama-3.2-1B-Instruct-4bit
          - name: gemma-3-1b
            repo: mlx-community/gemma-3-1b-it-qat-4bit
            cache_slug: mlx-community--gemma-3-1b-it-qat-4bit
          - name: gemma-2-2b
            repo: mlx-community/gemma-2-2b-it-4bit
            cache_slug: mlx-community--gemma-2-2b-it-4bit
          - name: glm-4-9b
            repo: mlx-community/GLM-4-9B-0414-4bit
            cache_slug: mlx-community--GLM-4-9B-0414-4bit
          - name: gemma-4-e4b
            repo: unsloth/gemma-4-E4B-it-UD-MLX-4bit
            cache_slug: unsloth--gemma-4-E4B-it-UD-MLX-4bit
          - name: lfm2-350m
            repo: mlx-community/LFM2-350M-4bit
            cache_slug: mlx-community--LFM2-350M-4bit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: behavior-macos-binaries
          path: ci-artifacts

      - name: Extract macOS binaries
        run: tar -xzf ci-artifacts/macos-binaries.tgz

      - name: Cache MLX model repo
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub/models--${{ matrix.cache_slug }}
          key: behavior-mlx-hub-${{ matrix.name }}

      - name: Run full MT-Bench behavior suite
        run: |
          python3 scripts/ci-mt-bench-behavior.py \
            --backend mlx \
            --mesh-llm macos-binaries/mesh-llm \
            --model "${{ matrix.repo }}" \
            --label "${{ matrix.name }}" \
            --output-json results/${{ matrix.name }}.json

      - name: Upload behavior report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-behavior-${{ matrix.name }}
          path: results/${{ matrix.name }}.json
          if-no-files-found: error
