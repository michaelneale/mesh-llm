name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHE_NAMESPACE: mesh-llm
  # Tiny model for integration tests (~138MB Q8_0, has chat template)
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  GGUF_PROMPT_MODEL_URL: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf
  GGUF_PROMPT_MODEL_FILE: qwen2.5-0.5b-instruct-q4_k_m.gguf
  MLX_PROMPT_MODEL_REPO: mlx-community/Qwen3-0.6B-4bit
  MLX_PROMPT_MODEL_CACHE_SLUG: mlx-community--Qwen3-0.6B-4bit
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'mesh-llm/src/**'
              - 'mesh-llm/build.rs'
              - 'mesh-llm/plugin/**'
              - 'mesh-llm/tests/**'
              - 'mesh-llm/proto/**'
              - 'mesh-llm/Cargo.toml'
              - 'mesh-llm/Cargo.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - 'scripts/**'
              - '.github/cache-version.txt'
              - '.github/workflows/**'
            ui:
              - 'mesh-llm/ui/**'

  linux:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - name: Install Python SDKs
        run: python -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      - name: Check formatting
        working-directory: mesh-llm
        run: cargo fmt -- --check || true

      - name: Clippy
        working-directory: mesh-llm
        run: cargo clippy -- -D warnings || true

      # ── llama.cpp (CPU-only for CI) ──
      - name: Clone llama.cpp fork
        run: git clone -b rebase-upstream-master --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server

      - name: Package Linux GGUF smoke binaries
        run: |
          mkdir -p ci-artifacts
          tar -czf ci-artifacts/linux-gguf-smoke-bins.tgz \
            target/release/mesh-llm \
            llama.cpp/build/bin/rpc-server \
            llama.cpp/build/bin/llama-server

      - name: Upload Linux GGUF smoke binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-gguf-smoke-bins
          path: ci-artifacts/linux-gguf-smoke-bins.tgz
          if-no-files-found: error

      # ── Download model ──
      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      - name: Cache GGUF prompt model
        id: cache-gguf-prompt-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.GGUF_PROMPT_MODEL_FILE }}
          key: model-${{ env.GGUF_PROMPT_MODEL_FILE }}

      - name: Download GGUF prompt model
        if: steps.cache-gguf-prompt-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$GGUF_PROMPT_MODEL_URL" -o ~/.models/$GGUF_PROMPT_MODEL_FILE
          ls -lh ~/.models/$GGUF_PROMPT_MODEL_FILE

      # ── Integration smoke test ──
      - name: Smoke test (real inference)
        run: |
          scripts/ci-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: GGUF prompt suite
        run: |
          scripts/ci-gguf-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$GGUF_PROMPT_MODEL_FILE \
            "Reply with exactly: blue" \
            "blue" \
            "" \
            "blue" \
            '[{"label":"alt-color","prompt":"Reply with exactly: green","expect_exact":"green"},{"label":"alt-red","prompt":"Reply with exactly: red","expect_exact":"red"}]'

      - name: OpenAI Python compat smoke
        run: |
          scripts/ci-compat-smoke.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        run: |
          scripts/ci-split-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/release/mesh-llm

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  macos:
    needs: changes
    if: ${{ vars.ENABLE_MACOS_CI == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      # ── llama.cpp (Metal + RPC) ──
      - name: Clone llama.cpp fork
        run: git clone -b rebase-upstream-master --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(sysctl -n hw.ncpu) --target rpc-server llama-server

      - name: Package macOS MLX smoke binaries
        run: |
          mkdir -p ci-artifacts
          tar -czf ci-artifacts/macos-mlx-smoke-bins.tgz \
            target/release/mesh-llm \
            llama.cpp/build/bin/rpc-server \
            llama.cpp/build/bin/llama-server

      - name: Upload macOS MLX smoke binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-mlx-smoke-bins
          path: ci-artifacts/macos-mlx-smoke-bins.tgz
          if-no-files-found: error

      # ── Download model ──
      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      # ── Integration smoke test ──
      - name: Smoke test (real inference)
        run: |
          scripts/ci-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        run: |
          scripts/ci-split-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/release/mesh-llm

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  macos_mlx:
    needs: [changes, macos]
    if: ${{ needs.macos.result == 'success' && vars.ENABLE_MACOS_CI == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    name: macOS MLX (${{ matrix.name }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen2.5-0.5b
            repo: mlx-community/Qwen2.5-0.5B-Instruct-4bit
            template_source: tokenizer_config.json
            cache_slug: mlx-community--Qwen2.5-0.5B-Instruct-4bit
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: ""
            thinking_mode: ""
            expect_exact: blue
          - name: qwen3-0.6b
            repo: mlx-community/Qwen3-0.6B-4bit
            template_source: tokenizer_config.json
            cache_slug: mlx-community--Qwen3-0.6B-4bit
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: ""
            thinking_mode: tagged
            expect_exact: blue
          - name: qwen3-josie-0.6b
            repo: mlx-community/JOSIE-IT1-Qwen3-0.6B-4bit
            template_source: chat_template.jinja
            cache_slug: mlx-community--JOSIE-IT1-Qwen3-0.6B-4bit
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: ""
            thinking_mode: multiline
            expect_exact: blue
          - name: llama-3.2-1b
            repo: mlx-community/Llama-3.2-1B-Instruct-4bit
            template_source: tokenizer_config.json
            cache_slug: mlx-community--Llama-3.2-1B-Instruct-4bit
            prompt: "Say hi."
            expect_contains: ""
            forbid_contains: ""
            thinking_mode: ""
            expect_exact: ""
          - name: gemma-3-1b
            repo: mlx-community/gemma-3-1b-it-qat-4bit
            template_source: ""
            cache_slug: mlx-community--gemma-3-1b-it-qat-4bit
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: ""
            thinking_mode: ""
            expect_exact: blue
          - name: gemma-2-2b
            repo: mlx-community/gemma-2-2b-it-4bit
            template_source: tokenizer_config.json
            cache_slug: mlx-community--gemma-2-2b-it-4bit
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: "{"
            thinking_mode: ""
            expect_exact: blue
          - name: glm-4-9b
            repo: mlx-community/GLM-4-9B-0414-4bit
            template_source: tokenizer_config.json
            cache_slug: mlx-community--GLM-4-9B-0414-4bit
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: "{"
            thinking_mode: ""
            expect_exact: blue
          - name: gemma-4-e4b
            repo: unsloth/gemma-4-E4B-it-UD-MLX-4bit
            template_source: chat_template.jinja
            cache_slug: unsloth--gemma-4-E4B-it-UD-MLX-4bit
            prompt: "Say the word blue."
            expect_contains: Blue
            forbid_contains: "{"
            thinking_mode: ""
            expect_exact: Blue
          - name: lfm2-350m
            repo: mlx-community/LFM2-350M-4bit
            template_source: chat_template.jinja
            cache_slug: mlx-community--LFM2-350M-4bit
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: "{"
            thinking_mode: ""
            expect_exact: blue
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS MLX smoke binaries
        uses: actions/download-artifact@v4
        with:
          name: macos-mlx-smoke-bins
          path: ci-artifacts

      - name: Extract macOS MLX smoke binaries
        run: tar -xzf ci-artifacts/macos-mlx-smoke-bins.tgz

      - name: Cache MLX model repo
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub/models--${{ matrix.cache_slug }}
          key: mlx-hub-${{ matrix.name }}

      - name: MLX smoke test (real inference)
        run: |
          scripts/ci-mlx-smoke-test.sh \
            target/release/mesh-llm \
            "${{ matrix.repo }}" \
            "${{ matrix.template_source }}" \
            "${{ matrix.prompt }}" \
            "${{ matrix.expect_contains }}" \
            "${{ matrix.forbid_contains }}" \
            "${{ matrix.thinking_mode }}" \
            "${{ matrix.expect_exact }}"

      - name: MLX prompt suite
        if: ${{ matrix.name == 'qwen3-0.6b' }}
        run: |
          scripts/ci-mlx-smoke-test.sh \
            target/release/mesh-llm \
            "${{ env.MLX_PROMPT_MODEL_REPO }}" \
            "tokenizer_config.json" \
            "Reply with exactly: blue" \
            "blue" \
            "" \
            "tagged" \
            "blue" \
            '[{"label":"alt-color","prompt":"Reply with exactly: green","expect_exact":"green"},{"label":"alt-red","prompt":"Reply with exactly: red","expect_exact":"red"}]'

  gguf_smokes:
    needs: [changes, linux]
    if: ${{ needs.linux.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    name: GGUF Smokes (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen2.5-0.5b
            url: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf
            file: qwen2.5-0.5b-instruct-q4_k_m.gguf
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: ""
          - name: qwen3-0.6b
            url: https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q8_0.gguf
            file: Qwen3-0.6B-Q8_0.gguf
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: ""
          - name: qwen3-josie-0.6b
            url: https://huggingface.co/mradermacher/JOSIE-IT1-Qwen3-0.6B-GGUF/resolve/main/JOSIE-IT1-Qwen3-0.6B.Q4_K_M.gguf
            file: JOSIE-IT1-Qwen3-0.6B.Q4_K_M.gguf
            prompt: "What is 2+2? Reply with one word only."
            expect_contains: "4"
            forbid_contains: ""
          - name: llama-3.2-1b
            url: https://huggingface.co/llmware/llama-3.2-1b-gguf/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf
            file: Llama-3.2-1B-Instruct-Q4_K_M.gguf
            prompt: "Say hi."
            expect_contains: ""
            forbid_contains: ""
          - name: gemma-3-1b
            url: https://huggingface.co/ggml-org/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-Q4_K_M.gguf
            file: gemma-3-1b-it-Q4_K_M.gguf
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: ""
          - name: gemma-2-2b
            url: https://huggingface.co/bartowski/gemma-2-2b-it-GGUF/resolve/main/gemma-2-2b-it-Q4_K_M.gguf
            file: gemma-2-2b-it-Q4_K_M.gguf
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: "{"
          - name: glm-4-9b
            url: https://huggingface.co/lmstudio-community/GLM-4-9B-0414-GGUF/resolve/main/GLM-4-9B-0414-Q4_K_M.gguf
            file: GLM-4-9B-0414-Q4_K_M.gguf
            prompt: "Reply with exactly: blue"
            expect_contains: blue
            forbid_contains: "{"
          - name: gemma-4-e4b
            url: https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q4_K_M.gguf
            file: gemma-4-E4B-it-Q4_K_M.gguf
            prompt: "Say the word blue."
            expect_contains: Blue
            forbid_contains: "{"
    steps:
      - uses: actions/checkout@v5

      - name: Download Linux GGUF smoke binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-gguf-smoke-bins
          path: ci-artifacts

      - name: Extract Linux GGUF smoke binaries
        run: tar -xzf ci-artifacts/linux-gguf-smoke-bins.tgz

      - name: Cache GGUF model
        id: cache-gguf-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ matrix.file }}
          key: gguf-model-${{ matrix.name }}

      - name: Download GGUF model
        if: steps.cache-gguf-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "${{ matrix.url }}" -o ~/.models/${{ matrix.file }}
          ls -lh ~/.models/${{ matrix.file }}

      - name: GGUF smoke test (real inference)
        run: |
          scripts/ci-gguf-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/${{ matrix.file }} \
            "${{ matrix.prompt }}" \
            "${{ matrix.expect_contains }}" \
            "${{ matrix.forbid_contains }}"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_cuda:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux CUDA
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux CUDA backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-cuda

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_rocm:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux ROCm
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux ROCm backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-amd

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_vulkan:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux Vulkan
    runs-on: ubuntu-latest

    steps:
      - name: Install Vulkan build packages
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libvulkan-dev \
            glslc \
            python3
          sudo rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux Vulkan backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-vulkan

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Windows CI builds disabled for now. Keep release.yml and ci.yml aligned so
  # Windows stays an explicit opt-in until the workflow is intentionally restored.
