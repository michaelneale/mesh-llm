name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHE_NAMESPACE: mesh-llm
  # Tiny model for integration tests (~138MB Q8_0, has chat template)
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  # Small MoE model for MoE split tests (~598MB Q2_K, qwen35moe architecture)
  MOE_MODEL_URL: https://huggingface.co/Flexan/kshitijthakkar-qwen3.5-moe-0.87B-d0.8B-GGUF/resolve/main/qwen3.5-moe-0.87B-d0.8B.Q2_K.gguf
  MOE_MODEL_FILE: qwen3.5-moe-0.87B-d0.8B-Q2_K.gguf
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'mesh-llm/src/**'
              - 'mesh-llm/build.rs'
              - 'mesh-llm/plugin/**'
              - 'mesh-llm/tests/**'
              - 'mesh-llm/proto/**'
              - 'mesh-llm/Cargo.toml'
              - 'mesh-llm/Cargo.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - 'scripts/**'
              - '.github/cache-version.txt'
              - '.github/workflows/**'
            ui:
              - 'mesh-llm/ui/**'

  linux:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - name: Install Python SDKs
        run: python -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      # ── System dependencies ──
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      - name: Check formatting
        working-directory: mesh-llm
        run: cargo fmt -- --check || true

      - name: Clippy
        working-directory: mesh-llm
        run: cargo clippy -- -D warnings || true

      # ── llama.cpp (CPU-only for CI) ──
      - name: Clone llama.cpp fork
        run: git clone -b upstream-latest --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server llama-moe-split

      - name: Package Linux binaries
        run: |
          mkdir -p ci-artifacts/linux-binaries
          cp target/release/mesh-llm ci-artifacts/linux-binaries/
          cp llama.cpp/build/bin/rpc-server ci-artifacts/linux-binaries/
          cp llama.cpp/build/bin/llama-server ci-artifacts/linux-binaries/
          cp llama.cpp/build/bin/llama-moe-split ci-artifacts/linux-binaries/ 2>/dev/null || true
          tar -czf ci-artifacts/linux-binaries.tgz -C ci-artifacts linux-binaries

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: ci-artifacts/linux-binaries.tgz
          if-no-files-found: error

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/release/mesh-llm

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  macos:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      # ── llama.cpp (Metal + RPC) ──
      - name: Clone llama.cpp fork
        run: git clone -b upstream-latest --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(sysctl -n hw.ncpu) --target rpc-server llama-server llama-moe-split

      - name: Package macOS binaries
        run: |
          mkdir -p ci-artifacts/macos-binaries
          cp target/release/mesh-llm ci-artifacts/macos-binaries/
          cp llama.cpp/build/bin/rpc-server ci-artifacts/macos-binaries/
          cp llama.cpp/build/bin/llama-server ci-artifacts/macos-binaries/
          cp llama.cpp/build/bin/llama-moe-split ci-artifacts/macos-binaries/ 2>/dev/null || true
          cp llama.cpp/build/bin/*.dylib ci-artifacts/macos-binaries/ 2>/dev/null || true
          shopt -s nullglob
          metallibs=(target/release/build/mlx-sys-*/out/build/lib/mlx.metallib)
          if [ "${#metallibs[@]}" -gt 0 ]; then
            cp "${metallibs[0]}" ci-artifacts/macos-binaries/mlx.metallib
          fi
          tar -czf ci-artifacts/macos-binaries.tgz -C ci-artifacts macos-binaries

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: ci-artifacts/macos-binaries.tgz
          if-no-files-found: error

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/release/mesh-llm

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  mlx_smoke_tests:
    needs: [changes, macos]
    if: ${{ needs.macos.result == 'success' && vars.ENABLE_MACOS_CI == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    name: MLX Smoke Tests
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen2.5-0.5b
            id: qwen25
            cache_slug: meshllm--qwen2.5-0.5b-instruct-parity-8bit-mlx
          - name: qwen3-0.6b
            id: qwen3
            cache_slug: meshllm--qwen3-0.6b-parity-8bit-mlx
          - name: llama-3.2-1b
            id: llama32
            cache_slug: meshllm--llama-3.2-1b-instruct-parity-bf16-mlx
          - name: gemma-3-1b
            id: gemma3
            cache_slug: meshllm--gemma-3-1b-it-parity-bf16-mlx
          - name: gemma-2-2b
            id: gemma2
            cache_slug: meshllm--gemma-2-2b-it-parity-8bit-mlx
          - name: glm-4-9b
            id: glm4
            cache_slug: meshllm--glm-4-9b-0414-parity-4bit-mlx
          - name: gemma-4-e4b
            id: gemma4
            cache_slug: meshllm--gemma-4-e4b-it-parity-8bit-mlx
          - name: lfm2-350m
            id: lfm2
            cache_slug: meshllm--lfm2-350m-parity-4bit-mlx
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: ci-artifacts

      - name: Extract macOS binaries
        run: tar -xzf ci-artifacts/macos-binaries.tgz

      - name: Stage binaries for validation runner
        run: |
          mkdir -p target/release llama.cpp/build/bin
          cp macos-binaries/mesh-llm target/release/mesh-llm
          cp macos-binaries/rpc-server llama.cpp/build/bin/rpc-server
          cp macos-binaries/llama-server llama.cpp/build/bin/llama-server
          if [ -f macos-binaries/mlx.metallib ]; then
            cp macos-binaries/mlx.metallib target/release/mlx.metallib
          fi
          if ls macos-binaries/*.dylib >/dev/null 2>&1; then
            cp macos-binaries/*.dylib llama.cpp/build/bin/
          fi

      - name: Cache MLX model repo
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub/models--${{ matrix.cache_slug }}
          key: mlx-hub-${{ matrix.cache_slug }}

      - name: MLX exact matrix
        run: |
          python3 scripts/run-validation-matrix.py \
            --suite exact \
            --backend mlx \
            --skip-build \
            --cases "${{ matrix.id }}" \
            --stamp "ci-macos-mlx-${{ matrix.id }}"

      - name: Upload MLX exact results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-exact-${{ matrix.id }}
          path: MLX_VALIDATION_RESULTS/ci-macos-mlx-${{ matrix.id }}
          if-no-files-found: warn

  llama_smoke_tests:
    needs: [changes, linux]
    if: ${{ needs.linux.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    name: Llama Smoke Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen2.5-0.5b
            id: qwen25
            cache_slug: meshllm--qwen2.5-0.5b-instruct-parity-q8_0-gguf
          - name: qwen3-0.6b
            id: qwen3
            cache_slug: meshllm--qwen3-0.6b-parity-q8_0-gguf
          - name: llama-3.2-1b
            id: llama32
            cache_slug: meshllm--llama-3.2-1b-instruct-parity-f16-gguf
          - name: gemma-3-1b
            id: gemma3
            cache_slug: meshllm--gemma-3-1b-it-parity-f16-gguf
          - name: gemma-2-2b
            id: gemma2
            cache_slug: meshllm--gemma-2-2b-it-parity-q8_0-gguf
          - name: glm-4-9b
            id: glm4
            cache_slug: meshllm--glm-4-9b-0414-parity-q4_k_m-gguf
          - name: gemma-4-e4b
            id: gemma4
            cache_slug: meshllm--gemma-4-e4b-it-parity-q8_0-gguf
          - name: lfm2-350m
            id: lfm2
            cache_slug: meshllm--lfm2-350m-parity-q4_k_m-gguf
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        if: matrix.id == 'qwen25'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - uses: actions/setup-python@v6
        if: matrix.id == 'qwen25'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - name: Install Python SDKs
        if: matrix.id == 'qwen25'
        run: python -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      - name: Download Linux GGUF smoke binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: ci-artifacts

      - name: Extract Linux GGUF smoke binaries
        run: tar -xzf ci-artifacts/linux-binaries.tgz

      - name: Stage binaries for validation runner
        run: |
          mkdir -p target/release llama.cpp/build/bin
          cp linux-binaries/mesh-llm target/release/mesh-llm
          cp linux-binaries/rpc-server llama.cpp/build/bin/rpc-server
          cp linux-binaries/llama-server llama.cpp/build/bin/llama-server
          cp linux-binaries/llama-moe-split llama.cpp/build/bin/llama-moe-split 2>/dev/null || true

      # Keep model-exercising legacy smokes in smoke jobs, not build jobs.
      - name: Cache integration model
        if: matrix.id == 'qwen25'
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download integration model
        if: matrix.id == 'qwen25' && steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      - name: Smoke test (real inference)
        if: matrix.id == 'qwen25'
        run: |
          scripts/ci-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: OpenAI Python compat smoke
        if: matrix.id == 'qwen25'
        run: |
          scripts/ci-compat-smoke.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        if: matrix.id == 'qwen25'
        run: |
          scripts/ci-split-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Cache MoE model
        if: matrix.id == 'qwen25'
        id: cache-moe-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MOE_MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MOE_MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download MoE model
        if: matrix.id == 'qwen25' && steps.cache-moe-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MOE_MODEL_URL" -o ~/.models/$MOE_MODEL_FILE
          ls -lh ~/.models/$MOE_MODEL_FILE

      - name: MoE split test (expert sharding)
        if: matrix.id == 'qwen25'
        run: |
          scripts/ci-moe-split-test.sh \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: MoE mesh test (expert sharding end-to-end)
        if: matrix.id == 'qwen25'
        run: |
          scripts/ci-moe-mesh-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: Cache GGUF model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub/models--${{ matrix.cache_slug }}
          key: gguf-hub-${{ matrix.cache_slug }}

      - name: GGUF exact matrix
        run: |
          python3 scripts/run-validation-matrix.py \
            --suite exact \
            --backend gguf \
            --skip-build \
            --cases "${{ matrix.id }}" \
            --stamp "ci-gguf-${{ matrix.id }}"

      - name: Upload GGUF exact results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gguf-exact-${{ matrix.id }}
          path: MLX_VALIDATION_RESULTS/ci-gguf-${{ matrix.id }}
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_cuda:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux CUDA
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux CUDA backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-cuda

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Package Linux CUDA binaries
        shell: bash
        run: |
          mkdir -p ci-artifacts/linux-cuda-binaries
          cp target/release/mesh-llm ci-artifacts/linux-cuda-binaries/
          cp llama.cpp/build/bin/rpc-server ci-artifacts/linux-cuda-binaries/
          cp llama.cpp/build/bin/llama-server ci-artifacts/linux-cuda-binaries/
          cp llama.cpp/build/bin/llama-moe-split ci-artifacts/linux-cuda-binaries/ 2>/dev/null || true
          tar -czf ci-artifacts/linux-cuda-binaries.tgz -C ci-artifacts linux-cuda-binaries

      - name: Upload Linux CUDA binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-cuda-binaries
          path: ci-artifacts/linux-cuda-binaries.tgz
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_rocm:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux ROCm
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux ROCm backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-amd

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Package Linux ROCm binaries
        shell: bash
        run: |
          mkdir -p ci-artifacts/linux-rocm-binaries
          cp target/release/mesh-llm ci-artifacts/linux-rocm-binaries/
          cp llama.cpp/build/bin/rpc-server ci-artifacts/linux-rocm-binaries/
          cp llama.cpp/build/bin/llama-server ci-artifacts/linux-rocm-binaries/
          cp llama.cpp/build/bin/llama-moe-split ci-artifacts/linux-rocm-binaries/ 2>/dev/null || true
          tar -czf ci-artifacts/linux-rocm-binaries.tgz -C ci-artifacts linux-rocm-binaries

      - name: Upload Linux ROCm binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-rocm-binaries
          path: ci-artifacts/linux-rocm-binaries.tgz
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_vulkan:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux Vulkan
    runs-on: ubuntu-latest

    steps:
      - name: Install Vulkan build packages
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libvulkan-dev \
            glslc \
            python3
          sudo rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux Vulkan backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-vulkan

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Package Linux Vulkan binaries
        shell: bash
        run: |
          mkdir -p ci-artifacts/linux-vulkan-binaries
          cp target/release/mesh-llm ci-artifacts/linux-vulkan-binaries/
          cp llama.cpp/build/bin/rpc-server ci-artifacts/linux-vulkan-binaries/
          cp llama.cpp/build/bin/llama-server ci-artifacts/linux-vulkan-binaries/
          cp llama.cpp/build/bin/llama-moe-split ci-artifacts/linux-vulkan-binaries/ 2>/dev/null || true
          tar -czf ci-artifacts/linux-vulkan-binaries.tgz -C ci-artifacts linux-vulkan-binaries

      - name: Upload Linux Vulkan binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-vulkan-binaries
          path: ci-artifacts/linux-vulkan-binaries.tgz
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Windows CI builds disabled for now. Keep release.yml and ci.yml aligned so
  # Windows stays an explicit opt-in until the workflow is intentionally restored.
