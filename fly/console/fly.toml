app = "mesh-llm-console"
primary_region = "syd"

[build]
  dockerfile = "../Dockerfile"

[build.args]
  NODE_ENV = "production"
  VITE_API_URL = "https://meshllm.cloud"
  VITE_STORAGE_NAMESPACE = "mesh-llm-ui-production"

[env]
  APP_MODE = "console"
  NODE_ENV = "production"

[http_service]
  internal_port = 3131
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"
